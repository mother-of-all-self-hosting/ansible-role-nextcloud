---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
    force: true
driver:
  name: docker
platforms:
  - name: nextcloud-${MOLECULE_DISTRO:-ubuntu2604}-default
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2604}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      callback_result_format: yaml
  inventory:
    group_vars:
      all:
        # Helper variables
        nextcloud_debug_service_enabled: false

        # Variables for Nextcloud
        nextcloud_uid: 1000
        nextcloud_gid: 1000
        nextcloud_scheme: http
        nextcloud_hostname: localhost
        nextcloud_container_labels_traefik_enabled: false
        nextcloud_container_http_host_bind_port: 80
        nextcloud_database_type: sqlite
        nextcloud_environment_variables_nextcloud_admin_user: user
        nextcloud_environment_variables_nextcloud_admin_password: password
  env:
    # Workaround for https://github.com/ansible/molecule/issues/4391
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles:~/.ansible/roles
verifier:
  name: ansible
