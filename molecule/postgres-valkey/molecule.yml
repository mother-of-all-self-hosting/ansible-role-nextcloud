---
dependency:
  name: galaxy
  options:
    requirements-file: requirements.yml
driver:
  name: docker
platforms:
  - name: nextcloud-${MOLECULE_DISTRO:-ubuntu2604}-default
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-ubuntu2604}-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    cgroupns_mode: host
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  config_options:
    defaults:
      callback_result_format: yaml
  inventory:
    group_vars:
      all:
        # Helper variables
        nextcloud_debug_service_enabled: false

        # Variables for Nextcloud
        nextcloud_uid: 1000
        nextcloud_gid: 1000
        nextcloud_scheme: http
        nextcloud_hostname: localhost
        nextcloud_container_labels_traefik_enabled: false
        nextcloud_container_http_host_bind_port: 80
        nextcloud_database_type: sqlite
        nextcloud_environment_variables_nextcloud_admin_user: user
        nextcloud_environment_variables_nextcloud_admin_password: password

        # Variables required for Nextcloud to connect to the Postgres database (via Unix socket)
        nextcloud_database_postgres_username: my_database_username
        nextcloud_database_postgres_password: my_database_password
        nextcloud_database_name: nextcloud
        nextcloud_database_postgres_socket_enabled: true
        nextcloud_database_postgres_socket_path_host: "{{ postgres_run_path }}"
        nextcloud_systemd_required_services_list_auto: |
          {{
            (['postgres.service'])
          }}

        # Variables required for Nextcloud to connect to the Valkey data-store (via Unix socket)
        nextcloud_redis_socket_enabled: true
        nextcloud_redis_socket_path_host: "{{ valkey_run_path }}"
        nextcloud_systemd_required_services_list_custom:
          - "{{ valkey_identifier }}.service"

        # Variables for Postgres
        postgres_uid: 1000
        postgres_gid: 1000
        postgres_connection_password: postgres_password
        postgres_container_unix_socket_enabled: true
        postgres_managed_databases: |
          {{
            [{
              'name': nextcloud_database_name,
              'username': nextcloud_database_postgres_username,
              'password': nextcloud_database_postgres_password,
            }]
          }}

        # Variables for Valkey
        valkey_uid: 1000
        valkey_gid: 1000
        valkey_arch: amd64
  env:
    # Workaround for https://github.com/ansible/molecule/issues/4391
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles:~/.ansible/roles
scenario:
  # See: https://docs.ansible.com/projects/molecule/configuration/?h=test_sequence#scenario
  test_sequence:
    - dependency
    - cleanup
    - destroy
    - syntax
    - create
    - prepare
    - converge
    # Disable idempotence test for now due to ansible-role-postgres
    # - idempotence
    - side_effect
    - verify
    - cleanup
    - destroy
verifier:
  name: ansible
